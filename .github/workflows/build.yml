name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins
        run: ./gradlew make

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          find . -name "*.cs3" -exec cp {} deploy/ \;
          cp repo.json deploy/repo.json

      - name: Generate plugins.json from cs3 manifests
        run: |
          cd deploy
          python3 -c "
          import json, glob, os, zipfile, hashlib
          plugins = []
          for f in sorted(glob.glob('*.cs3')):
              file_size = os.path.getsize(f)
              with zipfile.ZipFile(f, 'r') as z:
                  manifest = json.loads(z.read('manifest.json'))
              with open(f, 'rb') as fh:
                  file_hash = 'sha256-' + hashlib.sha256(fh.read()).hexdigest()
              name = manifest.get('name', os.path.splitext(f)[0])
              entry = {
                  'url': 'https://raw.githubusercontent.com/robertozv80/donghua-ext/builds/' + f,
                  'status': 1,
                  'version': manifest.get('version', 1),
                  'apiVersion': 1,
                  'name': name,
                  'internalName': name,
                  'authors': ['robertozv80'],
                  'description': name + ' - Donghua/Anime provider',
                  'repositoryUrl': 'https://github.com/robertozv80/donghua-ext',
                  'language': 'es',
                  'tvTypes': ['Anime'],
                  'fileSize': file_size,
                  'fileHash': file_hash
              }
              plugins.append(entry)
          with open('plugins.json', 'w') as out:
              json.dump(plugins, out, indent=2)
          print('=== Final plugins.json ===')
          print(json.dumps(plugins, indent=2))
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: builds