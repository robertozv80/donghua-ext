name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins
        run: ./gradlew make

      - name: Find all generated files
        run: |
          echo "=== Searching for .cs3 files ==="
          find . -name "*.cs3"
          echo "=== Searching for plugins.json ==="
          find . -name "plugins.json"
          echo "=== Searching for manifest.json ==="
          find . -name "manifest.json"

      - name: Inspect cs3 files
        run: |
          for f in $(find . -name "*.cs3"); do
            echo "=== Contents of $f ==="
            unzip -l "$f"
          done

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          find . -name "*.cs3" -exec cp {} deploy/ \;
          
          GRADLE_PLUGINS=$(find . -name "plugins.json" | head -1)
          if [ -n "$GRADLE_PLUGINS" ]; then
            echo "Using Gradle-generated plugins.json from: $GRADLE_PLUGINS"
            cp "$GRADLE_PLUGINS" deploy/plugins.json
          else
            echo "No Gradle plugins.json found, generating manually"
            cd deploy
            python3 -c "
          import json, glob, os
          plugins = []
          for f in sorted(glob.glob('*.cs3')):
              name = os.path.splitext(f)[0]
              plugins.append({
                  'name': name,
                  'url': 'https://raw.githubusercontent.com/robertozv80/donghua-ext/builds/' + f,
                  'api': 'com.donghuaext.' + name,
                  'version': 1,
                  'authors': ['robertozv80'],
                  'description': name + ' - Donghua/Anime provider',
                  'language': 'es',
                  'types': ['Anime']
              })
          with open('plugins.json', 'w') as out:
              json.dump(plugins, out, indent=2)
          "
            cd ..
          fi
          
          cp repo.json deploy/repo.json
          echo "=== Deploy directory contents ==="
          ls -la deploy/
          echo "=== plugins.json ==="
          cat deploy/plugins.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: builds