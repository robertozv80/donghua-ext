name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins
        run: ./gradlew make

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          find . -name "*.cs3" -exec cp {} deploy/ \;
          cp repo.json deploy/repo.json
          ls -la deploy/

      - name: Generate plugins.json
        run: |
          cd deploy
          python3 -c "
          import json, glob, os
          plugins = []
          for f in sorted(glob.glob('*.cs3')):
              name = os.path.splitext(f)[0]
              plugins.append({
                  'name': name,
                  'url': 'https://raw.githubusercontent.com/robertozv80/donghua-ext/builds/' + f
              })
          with open('plugins.json', 'w') as out:
              json.dump(plugins, out, indent=2)
          "
          cat plugins.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: builds