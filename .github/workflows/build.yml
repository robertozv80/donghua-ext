name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins
        run: ./gradlew make

      - name: Find generated files
        run: |
          echo "=== .cs3 files ==="
          find . -name "*.cs3"
          echo "=== plugins.json ==="
          find . -name "plugins.json"
          echo "=== repo.json ==="
          find . -name "repo.json"

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          find . -name "*.cs3" -exec cp {} deploy/ \;

          GRADLE_PLUGINS=$(find . -path "*/build/plugins.json" | head -1)
          GRADLE_REPO=$(find . -path "*/build/repo.json" | head -1)

          if [ -n "$GRADLE_PLUGINS" ]; then
            echo "Using Gradle plugins.json: $GRADLE_PLUGINS"
            cp "$GRADLE_PLUGINS" deploy/plugins.json
            cat deploy/plugins.json
          else
            echo "Generating plugins.json manually"
            cd deploy
            python3 -c "
          import json, glob, os, zipfile, hashlib
          plugins = []
          for f in sorted(glob.glob('*.cs3')):
              file_size = os.path.getsize(f)
              with zipfile.ZipFile(f, 'r') as z:
                  manifest = json.loads(z.read('manifest.json'))
              with open(f, 'rb') as fh:
                  file_hash = 'sha256-' + hashlib.sha256(fh.read()).hexdigest()
              name = manifest.get('name', os.path.splitext(f)[0])
              entry = {
                  'url': 'https://raw.githubusercontent.com/robertozv80/donghua-ext/builds/' + f,
                  'status': 1,
                  'version': manifest.get('version', 1),
                  'apiVersion': 1,
                  'name': name,
                  'internalName': name,
                  'authors': ['robertozv80'],
                  'description': name + ' - Donghua/Anime provider',
                  'repositoryUrl': 'https://github.com/robertozv80/donghua-ext',
                  'language': 'es',
                  'tvTypes': ['Anime'],
                  'fileSize': file_size,
                  'fileHash': file_hash
              }
              plugins.append(entry)
          with open('plugins.json', 'w') as out:
              json.dump(plugins, out, indent=2)
          "
            cd ..
          fi

          if [ -n "$GRADLE_REPO" ]; then
            echo "Using Gradle repo.json: $GRADLE_REPO"
            cp "$GRADLE_REPO" deploy/repo.json
          else
            echo "Using local repo.json"
            cp repo.json deploy/repo.json
          fi

          echo "=== Deploy contents ==="
          ls -la deploy/
          echo "=== repo.json ==="
          cat deploy/repo.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: builds