name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins
        run: ./gradlew make

      - name: Find build output
        run: find . -name "*.cs3" -o -name "plugins.json" | head -20

      - name: Copy repo.json to build output
        run: |
          BUILD_DIR=$(find . -name "plugins.json" -exec dirname {} \; | head -1)
          if [ -z "$BUILD_DIR" ]; then
            BUILD_DIR="build"
            mkdir -p "$BUILD_DIR"
          fi
          cp repo.json "$BUILD_DIR/repo.json"
          echo "Build directory: $BUILD_DIR"
          ls -la "$BUILD_DIR"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: builds