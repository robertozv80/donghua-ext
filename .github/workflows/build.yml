name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Plugins
        run: ./gradlew make makePluginsJson

      - name: Fix plugins.json URLs
        run: |
          BASE_URL="https://raw.githubusercontent.com/${{ github.repository }}/builds"
          REPO_URL="https://github.com/${{ github.repository }}"
          
          python3 -c "
          import json
          with open('build/plugins.json', 'r') as f:
              plugins = json.load(f)
          for p in plugins:
              p['url'] = '$BASE_URL/' + p['internalName'] + '.cs3'
              p['repositoryUrl'] = '$REPO_URL'
          with open('build/plugins.json', 'w') as f:
              json.dump(plugins, f, indent=2)
          "
          
          echo "=== Fixed plugins.json ==="
          cat build/plugins.json

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          find . -name "*.cs3" -exec cp {} deploy/ \;

          cp build/plugins.json deploy/plugins.json
          cp repo.json deploy/repo.json
          echo "=== Deploy contents ==="
          ls -la deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: builds
